name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest ruff jsonschema

      - name: Compile Python files
        run: python -m py_compile researchkb/rk_health.py scripts/cursor_mcp_smoke.py scripts/init_researchkb_workspace.py scripts/public_repo_scan.py scripts/seed_demo_db.py scripts/query_demo.py scripts/standardize_run.py scripts/validate_examples.py

      - name: Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -vv --tb=short

      - name: Validate example JSON
        run: python scripts/validate_examples.py

      - name: Public hygiene scan
        run: python scripts/public_repo_scan.py .
